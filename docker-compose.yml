services:
  backend:
    image: ghcr.io/raclaws/legal-graph-rnd/backend:latest
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-https://api.anthropic.com}
      - AUTH_USER=${AUTH_USER:-admin}
      - AUTH_PASS=${AUTH_PASS:-admin}
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  frontend:
    image: ghcr.io/raclaws/legal-graph-rnd/frontend:latest
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
