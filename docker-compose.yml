services:
  backend:
    image: ghcr.io/raclaws/legal-graph-rnd/backend:latest
    ports:
      - "8000:8000"
    environment:
      - INFISICAL_CLIENT_ID=${INFISICAL_CLIENT_ID}
      - INFISICAL_CLIENT_SECRET=${INFISICAL_CLIENT_SECRET}
      - INFISICAL_ENV=${INFISICAL_ENV:-prod}
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  frontend:
    image: ghcr.io/raclaws/legal-graph-rnd/frontend:latest
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
